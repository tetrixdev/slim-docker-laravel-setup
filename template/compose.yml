# =============================================================================
# LOCAL DEVELOPMENT COMPOSE
# slim-docker-laravel-setup v0.1.0
# =============================================================================

services:
  {{PROJECT_NAME}}-php:
    build:
      context: .
      dockerfile: docker-laravel/local/php/Dockerfile
    container_name: {{PROJECT_NAME}}-php
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./{{LARAVEL_DIR}}:/var/www
      - .env:/var/www/.env
      - ./docker-laravel/shared/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
      - ./docker-laravel/local/php/entrypoint.sh:/entrypoint.sh:ro
      - ./docker-laravel/shared/supervisor/supervisord.conf:/etc/supervisor/supervisord.conf:ro
      - ./docker-laravel/local/php/supervisor:/etc/supervisor/conf.d:ro
    networks:
      - {{PROJECT_NAME}}
    depends_on:
      {{PROJECT_NAME}}-postgres:
        condition: service_healthy
      {{PROJECT_NAME}}-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  {{PROJECT_NAME}}-nginx:
    image: nginx:1.27-alpine
    container_name: {{PROJECT_NAME}}-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./{{LARAVEL_DIR}}:/var/www:ro
      - ./docker-laravel/shared/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - {{PROJECT_NAME}}
    depends_on:
      {{PROJECT_NAME}}-php:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  {{PROJECT_NAME}}-postgres:
    image: postgres:17-alpine
    container_name: {{PROJECT_NAME}}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: {{PROJECT_NAME}}
      POSTGRES_USER: {{PROJECT_NAME}}
      POSTGRES_PASSWORD: "${DB_PASSWORD:?ERROR: DB_PASSWORD is not set. Generate one with: openssl rand -base64 32}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${DB_EXTERNAL_PORT:-5433}:5432"
    networks:
      - {{PROJECT_NAME}}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U {{PROJECT_NAME}} -d {{PROJECT_NAME}}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  {{PROJECT_NAME}}-redis:
    image: redis:7-alpine
    container_name: {{PROJECT_NAME}}-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - {{PROJECT_NAME}}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  {{PROJECT_NAME}}:
    name: {{PROJECT_NAME}}-network
    driver: bridge

volumes:
  postgres-data:
    name: {{PROJECT_NAME}}-postgres
    driver: local
  redis-data:
    name: {{PROJECT_NAME}}-redis
    driver: local
